<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Forge Partners, Inc.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --navy-deep: #0F1628; --gold: #C9A84C; --gold-light: #E8C97A; --cream: #F5F0E8; --white: #FFFFFF; --text-muted: #8A9BB0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy-deep); color: var(--cream); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 600; letter-spacing: 0.14em; color: var(--white); text-decoration: none; margin-bottom: 4rem; }
  .logo span { color: var(--gold); }
  .num { font-family: 'Cormorant Garamond', serif; font-size: 8rem; font-weight: 300; color: var(--gold); opacity: 0.2; line-height: 1; margin-bottom: 1rem; }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; color: var(--white); margin-bottom: 1rem; }
  p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.7; max-width: 420px; margin-bottom: 2.5rem; }
  a.btn { display: inline-block; padding: 0.85rem 2rem; background: var(--gold); color: var(--navy-deep); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; transition: background 0.2s; }
  a.btn:hover { background: var(--gold-light); }
</style>
</head>
<body>
  <a href="/" class="logo">FORGE <span>PARTNERS</span></a>
  <div class="num">404</div>
  <h1>This page doesn't exist.</h1>
  <p>The page you're looking for may have moved or the link may be incorrect. Return to the homepage to find what you need.</p>
  <a href="/" class="btn">Return to Homepage</a>
</body>
</html>
